<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetPrime Profile - Account Settings & Wishlist</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('netprime_theme') || 'dark';
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>
  
  <!-- FontAwesome for Premium Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Sleek Styles -->
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body style="background-color: var(--bg-primary);">

  <!-- Floating Navigation Bar -->
  <nav class="navbar scrolled">
    <div class="navbar-brand" onclick="window.location.href='./index.html'" style="cursor: pointer;">
      <span>NET<span class="text-magenta">PRIME</span></span>
    </div>
    
    <ul class="navbar-menu">
      <li class="navbar-item"><a href="./index.html">Home</a></li>
      <li class="navbar-item active"><a href="./profile.html">My Wishlist</a></li>
      <li class="navbar-item"><a href="./checkout.html">Subscribe</a></li>
      <li class="navbar-item"><a href="./contact.html">Support</a></li>
    </ul>

    <div class="navbar-actions">
      <!-- Theme Switcher Button -->
      <button id="theme-toggle-btn" class="theme-toggle-btn" title="Toggle Light/Dark Theme">
        <i id="theme-toggle-icon" class="fa fa-moon"></i>
      </button>

      <!-- User Auth Buttons or Profile Avatar Trigger -->
      <div id="navbar-actions-dynamic" style="display: flex; gap: 15px;">
        <!-- Handled by main.js -->
      </div>

      <!-- Profile Avatar and Dropdown Menu -->
      <div id="profile-nav-container" class="profile-nav-container" style="display: none;">
        <button id="nav-avatar-btn" class="profile-avatar-btn">
          <img id="nav-avatar-img" src="./assets/prof.png" alt="User Avatar">
        </button>
        
        <div id="profile-dropdown" class="profile-dropdown">
          <div id="dropdown-user-block" class="profile-dropdown-user">
            <!-- Dynamic User info -->
          </div>
          <div class="profile-dropdown-item" onclick="window.location.href='./profile.html'">
            <i class="fa fa-user-circle"></i> My Account
          </div>
          <div class="profile-dropdown-item" onclick="window.location.href='./profile.html'">
            <i class="fa fa-heart"></i> My Wishlist
          </div>
          <div class="profile-dropdown-item" onclick="window.location.href='./checkout.html'">
            <i class="fa fa-ticket"></i> Premium Subscription
          </div>
          <div class="profile-dropdown-item" onclick="handleLogout()">
            <i class="fa fa-sign-out-alt"></i> Sign Out
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- Profile Layout -->
  <main class="profile-page container">
    
    <!-- DYNAMIC SIGN IN GATE CONTAINER -->
    <div id="profile-section-wrapper">
      
      <div class="checkout-grid">
        
        <!-- LEFT: User Details Profile Editor -->
        <div class="profile-card glass">
          <h2 style="font-family: var(--font-display); font-size: 1.6rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;">
            Profile Settings
          </h2>
          
          <!-- Large Avatar Display & Info Info -->
          <div class="profile-details-row">
            <div class="profile-avatar-large">
              <img id="large-avatar-display" src="./assets/prof.png" alt="User Large Profile">
            </div>
            <div class="profile-info-block">
              <h3 id="large-username-display" class="profile-username-title">Venkata Vinayak</h3>
              <p id="large-email-display" class="profile-email-sub">venkatavinayak@gmail.com</p>
              <div style="margin-top: 5px;">
                <span id="large-tier-badge" class="badge badge-free">Free Tier</span>
              </div>
            </div>
          </div>

          <!-- Settings Inputs -->
          <form id="profile-edit-form" style="display: flex; flex-direction: column; gap: 20px;">
            <div class="form-group" style="margin-bottom: 0;">
              <label class="form-label">Edit Display Name</label>
              <div class="form-input-wrapper">
                <input type="text" id="edit-username" class="form-input" placeholder="Display Name" required>
                <i class="fa fa-user-edit"></i>
              </div>
            </div>

            <!-- Avatar presetter grid picker -->
            <div>
              <label class="form-label">Choose Avatar Preset</label>
              <div class="avatar-grid-picker">
                <div class="avatar-pick-option selected" data-avatar="avatar1.png">
                  <img src="./assets/prof.png" alt="preset 1">
                </div>
                <div class="avatar-pick-option" data-avatar="avatar2.png">
                  <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?auto=format&fit=crop&w=100&q=80" alt="preset 2">
                </div>
                <div class="avatar-pick-option" data-avatar="avatar3.png">
                  <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80" alt="preset 3">
                </div>
                <div class="avatar-pick-option" data-avatar="avatar4.png">
                  <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=100&q=80" alt="preset 4">
                </div>
                <div class="avatar-pick-option" data-avatar="avatar5.png">
                  <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?auto=format&fit=crop&w=100&q=80" alt="preset 5">
                </div>
              </div>
            </div>

            <!-- Custom Avatar Upload Option -->
            <div class="form-group" style="margin-bottom: 0;">
              <label class="form-label">Or Upload Your Own Picture</label>
              <div style="display: flex; gap: 15px; align-items: center; margin-top: 5px;">
                <label for="custom-avatar-input" class="btn-outline" style="display: inline-flex; align-items: center; gap: 8px; cursor: pointer; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); transition: all 0.3s ease; margin-bottom: 0;">
                  <i class="fa fa-upload" style="color: var(--accent-magenta);"></i> Choose Image
                </label>
                <input type="file" id="custom-avatar-input" accept="image/*" style="display: none;">
                <span id="custom-avatar-filename" style="font-size: 0.85rem; color: var(--text-secondary); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">No file chosen</span>
              </div>
            </div>

            <button type="submit" class="btn-form-submit" style="height: 46px; font-size: 0.95rem; margin-top: 10px;">
              Save Profile Changes
            </button>
          </form>
        </div>

        <!-- RIGHT: Live Wishlist Showcase -->
        <div class="glass" style="padding: 40px; border-radius: 16px; min-height: 480px; display: flex; flex-direction: column;">
          <h2 style="font-family: var(--font-display); font-size: 1.6rem; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; display: flex; align-items: center; gap: 10px;">
            <i class="fa fa-heart" style="color: var(--accent-magenta);"></i> My Wishlist
          </h2>
          
          <div id="wishlist-grid-track" class="wishlist-grid" style="flex: 1;">
            <!-- Rendered dynamically -->
          </div>
        </div>

      </div>

    </div>

  </main>

  <!-- State Managers & Scripts - load in synchronous dependency order -->
  <script src="./js/state.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/main.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const user = window.NetPrimeState.getCurrentUser();
      
      // 1. Sign In Gate check
      if (!user || user.username === 'Guest User') {
        const wrapper = document.getElementById('profile-section-wrapper');
        wrapper.innerHTML = `
          <div class="glass" style="padding: 60px 40px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,0,127,0.15); max-width: 600px; margin: 40px auto 0 auto;">
            <i class="fa fa-user-circle" style="font-size: 4rem; color: var(--accent-magenta); text-shadow: var(--shadow-magenta); margin-bottom: 20px;"></i>
            <h2 style="font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 12px;">Sign In Required</h2>
            <p style="color: var(--text-secondary); font-size: 1rem; line-height: 1.6; margin-bottom: 30px;">
              Log in to your NetPrime account to modify settings and check your personalized wishlist database in real time.
            </p>
            <div style="display: flex; gap: 15px; justify-content: center;">
              <button class="btn-outline" onclick="showAuthModal('login')">Sign In</button>
              <button class="btn-premium" onclick="showAuthModal('signup')">Create Free Account</button>
            </div>
          </div>
        `;
        return;
      }

      // 2. Populate Form details
      const editInput = document.getElementById('edit-username');
      const largeName = document.getElementById('large-username-display');
      const largeEmail = document.getElementById('large-email-display');
      const largeAvatar = document.getElementById('large-avatar-display');
      const largeTier = document.getElementById('large-tier-badge');

      editInput.value = user.username;
      largeName.textContent = user.username;
      largeEmail.textContent = user.email;
      largeAvatar.src = getAvatarPath(user.avatar);
      
      const isPrem = window.NetPrimeState.isPremium();
      largeTier.className = `badge ${isPrem ? 'badge-premium' : 'badge-free'}`;
      largeTier.innerHTML = isPrem ? '<i class="fa fa-star"></i> Premium' : 'Free Tier';

      // 3. Highlight Selected Avatar Preset & Handle Custom Upload
      const options = document.querySelectorAll('.avatar-pick-option');
      let activeAvatar = user.avatar || 'avatar1.png';

      // Clear default selections if using a custom base64 image
      if (activeAvatar && !activeAvatar.startsWith('avatar')) {
        options.forEach(o => o.classList.remove('selected'));
      }

      options.forEach(opt => {
        const val = opt.getAttribute('data-avatar');
        if (val === activeAvatar) {
          options.forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
        }

        opt.addEventListener('click', () => {
          options.forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          activeAvatar = val;
          largeAvatar.src = getAvatarPath(val);
          
          // Clear custom file upload selection
          document.getElementById('custom-avatar-input').value = '';
          document.getElementById('custom-avatar-filename').textContent = 'No file chosen';
        });
      });

      // Handle Custom Uploaded Pic
      const fileInput = document.getElementById('custom-avatar-input');
      const fileNameSpan = document.getElementById('custom-avatar-filename');

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        if (!file.type.startsWith('image/')) {
          showToastMessage('Please select a valid image file');
          return;
        }

        fileNameSpan.textContent = file.name;

        const reader = new FileReader();
        reader.onload = function(event) {
          const img = new Image();
          img.onload = function() {
            // Resize and crop to 150x150 square
            const canvas = document.createElement('canvas');
            const maxDim = 150;
            canvas.width = maxDim;
            canvas.height = maxDim;
            
            const ctx = canvas.getContext('2d');
            const minSide = Math.min(img.width, img.height);
            const sx = (img.width - minSide) / 2;
            const sy = (img.height - minSide) / 2;
            
            ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, maxDim, maxDim);
            
            activeAvatar = canvas.toDataURL('image/jpeg', 0.85); // 85% compression
            largeAvatar.src = activeAvatar;

            // Deselect preset icons
            options.forEach(o => o.classList.remove('selected'));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });

      // 4. Form Submit handler
      const profileForm = document.getElementById('profile-edit-form');
      profileForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const updatedUser = {
          ...user,
          username: editInput.value.trim(),
          avatar: activeAvatar
        };

        window.NetPrimeState.saveUser(updatedUser);
        largeName.textContent = updatedUser.username;
        showToastMessage('Profile settings saved successfully!');
      });

      // 5. Render Wishlist Grid
      renderWishlistGrid();
    });

    // Renders the user's live wishlist
    function renderWishlistGrid() {
      const grid = document.getElementById('wishlist-grid-track');
      if (!grid) return;

      const wishlistIds = window.NetPrimeState.getWishlist();
      grid.innerHTML = '';

      if (wishlistIds.length === 0) {
        grid.innerHTML = `
          <div class="wishlist-empty-msg">
            <i class="fa fa-heart-broken" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 15px; display: block;"></i>
            Your wishlist is currently empty.<br>
            <a href="./index.html" style="color: var(--accent-magenta); font-weight: 600; margin-top: 10px; display: inline-block;">Browse and Add Movies</a>
          </div>
        `;
        return;
      }

      wishlistIds.forEach(id => {
        const movie = window.NetPrimeState.getMovieById(id);
        if (!movie) return;

        const cardWrapper = document.createElement('div');
        cardWrapper.className = 'movie-card-wrapper';
        cardWrapper.style.flex = 'none'; // Grid behaves responsively
        
        cardWrapper.innerHTML = `
          <div class="movie-card" data-id="${movie.id}">
            <img class="movie-card-poster" src="${movie.poster}" alt="${movie.title}" onerror="this.src='./assets/prime.png'">
            
            <div class="movie-card-badge">
              <span class="badge ${movie.isFree ? 'badge-free' : 'badge-premium'}">
                ${movie.isFree ? 'Free' : '<i class="fa fa-lock"></i> Premium'}
              </span>
            </div>

            <div class="movie-card-overlay">
              <div class="movie-card-details">
                <h4 class="movie-card-title">${movie.title}</h4>
                <div class="movie-card-meta">
                  <span class="rating">★ ${movie.rating}</span>
                  <span>${movie.year}</span>
                </div>
                <div class="movie-card-actions">
                  <button class="movie-card-play-btn" onclick="event.stopPropagation(); handleMovieClick('${movie.id}')">▶</button>
                  <button class="movie-card-wishlist-btn active" onclick="event.stopPropagation(); removeWishlistItem('${movie.id}')">
                    ❤️
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;

        // 3D Card Hover Tilts
        const cardInner = cardWrapper.querySelector('.movie-card');
        cardInner.addEventListener('click', () => {
          handleMovieClick(movie.id);
        });

        // High-performance dynamic 3D Card Hover Tilts (binds mousemove only when hovered, preventing scroll lag)
        let handleTilt = null;
        cardInner.addEventListener('mouseenter', () => {
          handleTilt = (e) => {
            const rect = cardInner.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const width = rect.width;
            const height = rect.height;
            
            const rotateY = ((x / width) - 0.5) * 20; // -10deg to 10deg
            const rotateX = ((y / height) - 0.5) * -20; // -10deg to 10deg
            
            cardInner.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
          };
          cardInner.addEventListener('mousemove', handleTilt);
        });

        cardInner.addEventListener('mouseleave', () => {
          if (handleTilt) {
            cardInner.removeEventListener('mousemove', handleTilt);
            handleTilt = null;
          }
          cardInner.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
        });

        grid.appendChild(cardWrapper);
      });
    }

    // Direct removal callback from wishlist grid
    function removeWishlistItem(movieId) {
      window.NetPrimeState.removeFromWishlist(movieId);
      showToastMessage('Removed from wishlist');
      renderWishlistGrid();
    }

    // Re-render automatically if updated elsewhere (e.g. cross-tab sync)
    window.addEventListener('netprime_wishlistChange', renderWishlistGrid);
  </script>
</body>
</html>
