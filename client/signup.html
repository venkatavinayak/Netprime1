<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetPrime - Create Account</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('netprime_theme') || 'dark';
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body style="background-color: #000; overflow-x: hidden;">

  <div class="auth-page-container">
    <div class="auth-page-backdrop"></div>
    
    <a href="./index.html" class="navbar-brand" style="position: absolute; top: 30px; left: 5%; z-index: 10;">
      <span>NET<span class="text-magenta">PRIME</span></span>
    </a>

    <div style="position: absolute; top: 30px; right: 5%; z-index: 10; display: flex; gap: 15px; align-items: center;">
      <button id="theme-toggle-btn" class="theme-toggle-btn" title="Toggle Light/Dark Theme">
        <i id="theme-toggle-icon" class="fa fa-moon"></i>
      </button>
    </div>

    <!-- Futuristic Glassmorphic Signup box -->
    <div class="auth-card-glass glass">
      <div class="modal-header">
        <h2 style="font-family: var(--font-display); font-size: 2rem; font-weight: 900; color: #fff;">Create Account</h2>
        <p style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 5px;">Register a free account to begin streaming</p>
      </div>

      <form id="standalone-signup-form" style="display: flex; flex-direction: column; gap: 20px;">
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">Full Name</label>
          <div class="form-input-wrapper">
            <input type="text" id="signup-name" class="form-input" placeholder="John Doe" required>
            <i class="fa fa-user"></i>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">Email Address</label>
          <div class="form-input-wrapper">
            <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required>
            <i class="fa fa-envelope"></i>
          </div>
        </div>

        <div id="password-group" class="form-group" style="margin-bottom: 0;">
          <label class="form-label">Password</label>
          <div class="form-input-wrapper">
            <input type="password" id="signup-password" class="form-input" placeholder="••••••••" required>
            <i class="fa fa-lock"></i>
          </div>
        </div>

        <button type="submit" id="signup-submit-btn" class="btn-form-submit" style="margin-top: 10px; height: 48px;">
          Register Account
        </button>
        
        <button type="button" id="magic-link-btn" class="btn-form-submit" style="margin-top: 10px; height: 48px; display: none; background: linear-gradient(135deg, #a0005a 0%, var(--accent-magenta) 100%);">
          Send Magic Registration Link
        </button>

        <span id="toggle-magic-link" style="display: block; text-align: center; margin-top: 5px; font-size: 0.9rem; color: var(--accent-magenta); cursor: pointer; font-weight: bold; transition: color 0.2s;">
          Sign Up with Magic Link (Passwordless)
        </span>
      </form>

      <div class="oauth-divider" style="margin: 20px 0; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); line-height: 0.1em;"><span style="background: #111; padding: 0 10px; color: #666; font-size: 0.85rem;">or</span></div>
      <button type="button" id="standalone-google-signup-btn" class="btn-form-submit" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; height: 48px;">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.8 2.72v2.24h2.9c1.7-1.57 2.7-3.87 2.7-6.59z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.91-2.24c-.8.54-1.84.87-3.05.87-2.35 0-4.33-1.59-5.04-3.73H.95v2.3C2.43 15.89 5.5 18 9 18z" fill="#34A853"/><path d="M3.96 10.7c-.18-.54-.28-1.12-.28-1.7s.1-1.16.28-1.7V5.01H.95C.35 6.2.01 7.56.01 9s.34 2.8 1.04 3.99l3.01-2.29z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.05C13.46.6 11.43 0 9 0 5.5 0 2.43 2.11.95 5.01l3.01 2.29c.71-2.14 2.69-3.72 5.04-3.72z" fill="#EA4335"/></svg>
        Sign Up with Google
      </button>

      <p class="form-toggle-link" style="margin-top: 25px;">
        Already have an account? <a href="./login.html" style="color: var(--accent-magenta); font-weight: 700;">Sign in</a>
      </p>
    </div>
  </div>

  <script src="./js/state.js"></script>
  <script src="./js/auth.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Auto-redirect if already logged in
      const checkAndRedirect = (user = null) => {
        const currentUser = user || (window.NetPrimeState ? window.NetPrimeState.currentUser : null);
        if (currentUser && currentUser.email && currentUser.email !== 'guest@netprime.com') {
          window.location.href = './index.html';
        }
      };
      
      window.addEventListener('netprime_userChange', (e) => checkAndRedirect(e.detail));
      checkAndRedirect();

      const signupForm = document.getElementById('standalone-signup-form');
      const googleBtn = document.getElementById('standalone-google-signup-btn');
      const toggleMagicLink = document.getElementById('toggle-magic-link');
      const passwordGroup = document.getElementById('password-group');
      const passwordInput = document.getElementById('signup-password');
      const signupSubmitBtn = document.getElementById('signup-submit-btn');
      const magicLinkBtn = document.getElementById('magic-link-btn');
      
      let isMagicMode = false;
      
      toggleMagicLink.addEventListener('click', () => {
        isMagicMode = !isMagicMode;
        if (isMagicMode) {
          passwordGroup.style.display = 'none';
          passwordInput.required = false;
          signupSubmitBtn.style.display = 'none';
          magicLinkBtn.style.display = 'block';
          toggleMagicLink.textContent = 'Sign Up with Password';
        } else {
          passwordGroup.style.display = 'block';
          passwordInput.required = true;
          signupSubmitBtn.style.display = 'block';
          magicLinkBtn.style.display = 'none';
          toggleMagicLink.textContent = 'Sign Up with Magic Link (Passwordless)';
        }
      });
      
      magicLinkBtn.addEventListener('click', async () => {
        const nameInput = document.getElementById('signup-name');
        const emailInput = document.getElementById('signup-email');
        
        if (!nameInput.checkValidity()) {
          nameInput.reportValidity();
          return;
        }
        if (!emailInput.checkValidity()) {
          emailInput.reportValidity();
          return;
        }
        
        const email = emailInput.value.trim();
        await window.sendMagicLink(email, magicLinkBtn);
      });

      // Form submit handler
      signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;
        
        const submitBtn = signupForm.querySelector('.btn-form-submit');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Registering...';

        try {
          await window.NetPrimeState.register(name, email, password);
          window.showToastMessage('Success! A verification link has been sent to your email.');
          submitBtn.textContent = 'Verification Sent';
        } catch (err) {
          window.showToastMessage(err.message);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Register Account';
        }
      });

      // Bind Google signup button
      googleBtn.addEventListener('click', () => {
        const overlayBtn = document.getElementById('google-signup-btn');
        if (overlayBtn) {
          overlayBtn.click();
        } else {
          window.showAuthModal('signup');
          setTimeout(() => {
            const btn = document.getElementById('google-signup-btn');
            if (btn) btn.click();
          }, 200);
        }
      });
    });
  </script>

</body>
</html>
