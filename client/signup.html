<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetPrime - Create Account</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body style="background-color: #000; overflow-x: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh;">

  <div id="clerk-auth-container" style="text-align: center; color: #fff;">
    <i class="fa fa-spinner fa-spin fa-2x" style="color: var(--accent-magenta);"></i>
    <p style="margin-top: 15px; font-family: var(--font-display); font-size: 0.9rem;">Redirecting to Create Account...</p>
  </div>

  <script src="./js/state.js"></script>
  <script src="./js/auth.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Auto-redirect if already logged in on the backend
      const checkAndRedirect = (user = null) => {
        const currentUser = user || (window.NetPrimeState ? window.NetPrimeState.currentUser : null);
        if (currentUser && currentUser.email && currentUser.email !== 'guest@netprime.com') {
          window.location.href = './index.html';
        }
      };
      
      window.addEventListener('netprime_userChange', (e) => checkAndRedirect(e.detail));
      checkAndRedirect();
    });
  </script>
</body>
</html>
