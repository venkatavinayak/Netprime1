<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetPrime - Sign In</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('netprime_theme') || 'dark';
      if (savedTheme === 'light') {
        document.documentElement.classList.add('light-theme');
      }
    })();
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body style="background-color: #000; overflow-x: hidden;">

  <div class="auth-page-container">
    <div class="auth-page-backdrop"></div>
    
    <a href="./index.html" class="navbar-brand" style="position: absolute; top: 30px; left: 5%; z-index: 10;">
      <span>NET<span class="text-magenta">PRIME</span></span>
    </a>

    <div style="position: absolute; top: 30px; right: 5%; z-index: 10; display: flex; gap: 15px; align-items: center;">
      <button id="theme-toggle-btn" class="theme-toggle-btn" title="Toggle Light/Dark Theme">
        <i id="theme-toggle-icon" class="fa fa-moon"></i>
      </button>
    </div>

    <!-- Futuristic Glassmorphic login box -->
    <div class="auth-card-glass glass">
      <div class="modal-header">
        <h2 style="font-family: var(--font-display); font-size: 2rem; font-weight: 900; color: #fff;">Sign In</h2>
        <p style="font-size: 0.9rem; color: var(--text-secondary); margin-top: 5px;">Enter credentials to access your streaming catalog</p>
      </div>

      <form id="standalone-login-form" style="display: flex; flex-direction: column; gap: 20px;">
        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">Email Address</label>
          <div class="form-input-wrapper">
            <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
            <i class="fa fa-envelope"></i>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 0;">
          <label class="form-label">Password</label>
          <div class="form-input-wrapper">
            <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
            <i class="fa fa-lock"></i>
          </div>
        </div>

        <div class="form-options" style="display: flex; justify-content: space-between; align-items: center;">
          <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #ccc; cursor: pointer;">
            <input type="checkbox" id="login-remember" style="accent-color: var(--accent-magenta);"> Remember Me
          </label>
          <span id="standalone-forgot-password" style="font-size: 0.85rem; color: var(--accent-magenta); cursor: pointer;">Forgot Password?</span>
        </div>

        <button type="submit" class="btn-form-submit" style="margin-top: 10px; height: 48px;">
          Sign In
        </button>
      </form>

      <div class="oauth-divider" style="margin: 20px 0; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); line-height: 0.1em;"><span style="background: #111; padding: 0 10px; color: #666; font-size: 0.85rem;">or</span></div>
      <button type="button" id="standalone-google-btn" class="btn-form-submit" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; height: 48px;">
        <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.8 2.72v2.24h2.9c1.7-1.57 2.7-3.87 2.7-6.59z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.2l-2.91-2.24c-.8.54-1.84.87-3.05.87-2.35 0-4.33-1.59-5.04-3.73H.95v2.3C2.43 15.89 5.5 18 9 18z" fill="#34A853"/><path d="M3.96 10.7c-.18-.54-.28-1.12-.28-1.7s.1-1.16.28-1.7V5.01H.95C.35 6.2.01 7.56.01 9s.34 2.8 1.04 3.99l3.01-2.29z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.05C13.46.6 11.43 0 9 0 5.5 0 2.43 2.11.95 5.01l3.01 2.29c.71-2.14 2.69-3.72 5.04-3.72z" fill="#EA4335"/></svg>
        Sign In with Google
      </button>

      <p class="form-toggle-link" style="margin-top: 25px;">
        New to NetPrime? <a href="./signup.html" style="color: var(--accent-magenta); font-weight: 700;">Sign up now</a>
      </p>
    </div>
  </div>

  <script src="./js/state.js"></script>
  <script src="./js/auth.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Auto-redirect if already logged in
      const checkAndRedirect = () => {
        if (window.NetPrimeState && window.NetPrimeState.currentUser && window.NetPrimeState.currentUser.email) {
          if (window.NetPrimeState.currentUser.email === 'admin@netprime.com') {
            window.location.href = './admin.html';
          } else {
            window.location.href = './index.html';
          }
        }
      };
      
      if (window.NetPrimeState) {
        window.NetPrimeState.addEventListener('userChange', checkAndRedirect);
        checkAndRedirect();
      }

      const loginForm = document.getElementById('standalone-login-form');
      const googleBtn = document.getElementById('standalone-google-btn');
      const forgotLink = document.getElementById('standalone-forgot-password');

      // Form submit handler
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const rememberMe = document.getElementById('login-remember').checked;
        
        const submitBtn = loginForm.querySelector('.btn-form-submit');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Authenticating...';

        try {
          await window.NetPrimeState.login(email, password, rememberMe);
          window.showToastMessage('Login successful! Redirecting...');
          setTimeout(() => {
            if (email === 'admin@netprime.com') {
              window.location.href = './admin.html';
            } else {
              window.location.href = './index.html';
            }
          }, 800);
        } catch (err) {
          window.showToastMessage(err.message);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      });

      // Bind forgot password click
      forgotLink.addEventListener('click', () => {
        const email = prompt("Enter your email address to receive password reset link:");
        if (email) {
          fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          })
          .then(res => res.json())
          .then(data => window.showToastMessage(data.message || 'Reset link sent.'))
          .catch(() => window.showToastMessage('Action failed.'));
        }
      });

      // Bind Google Button to use the global auth modal logic
      googleBtn.addEventListener('click', () => {
        // Trigger the google authentication action defined in public/js/auth.js
        const overlayBtn = document.getElementById('google-login-btn');
        if (overlayBtn) {
          overlayBtn.click();
        } else {
          // If modal isn't injected, invoke showAuthModal to initialize the listeners
          window.showAuthModal('login');
          setTimeout(() => {
            const btn = document.getElementById('google-login-btn');
            if (btn) btn.click();
          }, 200);
        }
      });
    });
  </script>

</body>
</html>
