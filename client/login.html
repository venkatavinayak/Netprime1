<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetPrime - Sign In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body style="background-color: #000; overflow-x: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh;">

  <div id="clerk-auth-container" style="min-height: 450px; display: flex; align-items: center; justify-content: center;"></div>

  <script src="./js/state.js"></script>
  <script src="./js/auth.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Auto-redirect if already logged in on the backend
      const checkAndRedirect = (user = null) => {
        const currentUser = user || (window.NetPrimeState ? window.NetPrimeState.currentUser : null);
        if (currentUser && currentUser.email && currentUser.email !== 'guest@netprime.com') {
          if (currentUser.email === 'admin@netprime.com') {
            window.location.href = './admin.html';
          } else {
            window.location.href = './index.html';
          }
        }
      };
      
      window.addEventListener('netprime_userChange', (e) => checkAndRedirect(e.detail));
      checkAndRedirect();
    });
  </script>
</body>
</html>
