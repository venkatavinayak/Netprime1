<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetPrime Player - Immersive Cinema Experience</title>
  
  <!-- FontAwesome for Video Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Sleek Styles -->
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">
</head>
<body class="player-page">

  <!-- Immersive Player Screen Container -->
  <div id="video-container" class="video-container controls-active">
    
    <!-- Clean HTML5 native video player -->
    <video id="video-element" class="video-element" playsinline>
      <!-- Source dynamically set by player.js -->
      Your browser does not support HTML5 video streaming.
    </video>

    <!-- Translucent Overlay Controller (hides automatically on inactivity) -->
    <div class="video-controls-overlay">
      
      <!-- Top Header Details -->
      <div class="player-header">
        <button onclick="window.history.back()" class="player-back-btn">
          <i class="fa fa-arrow-left"></i>
        </button>
        <div class="player-title-info">
          <h2 id="player-movie-title">Loading...</h2>
          <p id="player-movie-meta">Telugu • 2024</p>
        </div>
      </div>

      <!-- Bottom controls (Scrubber + Play buttons) -->
      <div class="player-controls-bottom">
        
        <!-- Scrubber Progress Bar -->
        <div id="scrubber-container" class="scrubber-container">
          <div id="scrubber-progress" class="scrubber-progress"></div>
          <div id="scrubber-handle" class="scrubber-handle"></div>
          <div id="scrubber-tooltip" class="scrubber-tooltip">00:00</div>
        </div>

        <!-- Buttons Row -->
        <div class="player-buttons-row">
          
          <!-- Left Control Panel -->
          <div class="player-buttons-left">
            <button id="play-btn" class="player-btn" title="Play/Pause (Space)">
              <i class="fa fa-play"></i>
            </button>
            
            <button id="skip-back-btn" class="player-btn" title="Skip Back 10s (Left Arrow)">
              <i class="fa fa-backward"></i>
            </button>
            
            <button id="skip-forward-btn" class="player-btn" title="Skip Forward 10s (Right Arrow)">
              <i class="fa fa-forward"></i>
            </button>

            <!-- Volume with slider expander -->
            <div class="volume-control-wrapper">
              <button id="volume-btn" class="player-btn" title="Mute/Unmute">
                <i class="fa fa-volume-high"></i>
              </button>
              <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.05" value="1">
            </div>

            <!-- Time stamps counters -->
            <div class="time-display">
              <span id="time-current">00:00</span> / <span id="time-duration">00:00</span>
            </div>
          </div>

          <!-- Right Control Panel -->
          <div class="player-buttons-right">
            <!-- Playback Rate -->
            <button id="speed-btn" class="player-btn" style="font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; border: 1.5px solid rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 6px;" title="Playback Speed">
              1.0x
            </button>

            <button id="fullscreen-btn" class="player-btn" title="Toggle Fullscreen">
              <i class="fa fa-expand"></i>
            </button>
          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- State Managers & Controllers -->
  <script src="./js/state.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/player.js"></script>
</body>
</html>
