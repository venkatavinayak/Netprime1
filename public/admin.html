<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetPrime - Admin Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">

  <style>
    .admin-container {
      max-width: 1200px;
      margin: 100px auto 50px auto;
      padding: 20px;
    }
    .admin-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      padding: 25px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,0,127,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .stat-card h3 {
      font-size: 0.9rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      font-family: 'Outfit', sans-serif;
    }
    .admin-search-box {
      margin-bottom: 30px;
      display: flex;
      gap: 15px;
    }
    .admin-search-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 20px;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
    }
    .admin-search-input:focus {
      border-color: var(--accent-magenta);
    }
    .admin-table-container {
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    th, td {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    th {
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      background: rgba(255,255,255,0.02);
    }
    tr:hover {
      background: rgba(255,255,255,0.02);
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
    }
    .badge-active { background: rgba(0, 255, 102, 0.15); color: #00ff66; }
    .badge-expired { background: rgba(255, 170, 0, 0.15); color: #ffaa00; }
    .badge-free { background: rgba(255, 255, 255, 0.15); color: #fff; }
    .btn-action {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.2s, background-color 0.2s;
    }
    .btn-cancel { background: rgba(255, 170, 0, 0.15); color: #ffaa00; }
    .btn-cancel:hover { background: rgba(255, 170, 0, 0.25); transform: translateY(-1px); }
    .btn-delete { background: rgba(255, 0, 127, 0.15); color: #ff007f; }
    .btn-delete:hover { background: rgba(255, 0, 127, 0.25); transform: translateY(-1px); }
  </style>
</head>
<body>

  <!-- NAVIGATION NAVBAR -->
  <nav class="navbar glass">
    <div class="nav-content">
      <div class="nav-left">
        <a href="./index.html" class="logo-text">NETPRIME</a>
        <span style="font-size: 0.8rem; font-weight: bold; color: var(--accent-magenta); background: rgba(255,0,127,0.15); padding: 3px 8px; border-radius: 4px; margin-left: 10px; text-transform: uppercase; letter-spacing: 0.5px;">ADMIN PANEL</span>
      </div>
      <div class="nav-right">
        <button id="theme-toggle-btn" class="nav-icon-btn"><i id="theme-toggle-icon" class="fa fa-moon"></i></button>
        <button class="btn-outline" onclick="window.NetPrimeState.logout()">Log Out</button>
      </div>
    </div>
  </nav>

  <!-- ADMIN BODY -->
  <div class="admin-container">
    <h1 style="font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 800; color: #fff; margin-bottom: 30px;">Analytics & User Directory</h1>
    
    <!-- STATS BLOCKS -->
    <div class="admin-stats-grid">
      <div class="stat-card glass">
        <h3>Total Users</h3>
        <div class="value" id="stat-total-users">-</div>
      </div>
      <div class="stat-card glass">
        <h3>Active Premium</h3>
        <div class="value" id="stat-active-subs" style="color: #00ff66;">-</div>
      </div>
      <div class="stat-card glass">
        <h3>Today Revenue</h3>
        <div class="value" id="stat-revenue-today" style="color: var(--accent-magenta);">-</div>
      </div>
      <div class="stat-card glass">
        <h3>Total Revenue</h3>
        <div class="value" id="stat-revenue-total" style="color: #00c3ff;">-</div>
      </div>
    </div>

    <!-- DIRECTORY SEARCH -->
    <div class="admin-search-box">
      <input type="text" id="admin-search-input" class="admin-search-input" placeholder="Search users by name, email, payment ID, subscription ID...">
      <button class="btn-premium" id="btn-search" style="padding: 12px 25px;">Search</button>
    </div>

    <!-- USERS DIRECTORY TABLE -->
    <div class="admin-table-container glass">
      <table>
        <thead>
          <tr>
            <th>User Details</th>
            <th>Registered</th>
            <th>Subscription Plan</th>
            <th>Valid Expiry</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="user-table-body">
          <tr>
            <td colspan="5" style="text-align: center; color: var(--text-secondary);">Loading directory records...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="./js/state.js"></script>
  <script src="./js/auth.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Enforce admin locks
      window.NetPrimeState.onInitialized(() => {
        const user = window.NetPrimeState.getCurrentUser();
        if (!user || user.email !== 'admin@netprime.com') {
          window.location.href = './index.html';
        } else {
          loadAdminStats();
          loadUserList();
        }
      });

      const searchInput = document.getElementById('admin-search-input');
      const searchBtn = document.getElementById('btn-search');

      searchBtn.addEventListener('click', () => loadUserList(searchInput.value));
      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') loadUserList(searchInput.value);
      });

      // Fetch dashboard metrics
      async function loadAdminStats() {
        try {
          const res = await fetch('/api/admin/stats');
          if (res.ok) {
            const data = await res.json();
            document.getElementById('stat-total-users').textContent = data.metrics.totalUsers;
            document.getElementById('stat-active-subs').textContent = data.metrics.activeSubscriptions;
            document.getElementById('stat-revenue-today').textContent = `₹${data.revenue.today}`;
            document.getElementById('stat-revenue-total').textContent = `₹${data.revenue.total}`;
          }
        } catch (err) {
          console.error(err);
        }
      }

      // Load matching users
      async function loadUserList(query = '') {
        const tbody = document.getElementById('user-table-body');
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-secondary);"><i class="fa fa-spinner fa-spin"></i> Reading database records...</td></tr>`;

        try {
          const res = await fetch(`/api/admin/users?query=${encodeURIComponent(query)}`);
          if (res.ok) {
            const users = await res.json();
            if (users.length === 0) {
              tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--text-secondary);">No matching subscriber accounts found.</td></tr>`;
              return;
            }

            tbody.innerHTML = '';
            users.forEach(item => {
              const tr = document.createElement('tr');
              
              // Map status badge
              let badgeClass = 'badge-free';
              let subStatus = item.subscription.plan;
              if (item.subscription.status === 'ACTIVE') {
                badgeClass = 'badge-active';
              } else if (item.subscription.status === 'EXPIRED') {
                badgeClass = 'badge-expired';
                subStatus = 'EXPIRED';
              }

              // Expiry date format
              const expiryText = item.subscription.expiryDate 
                ? new Date(item.subscription.expiryDate).toLocaleDateString()
                : 'Lifetime (Free)';

              // Cancel button rendering if active subscription
              const actionBtn = (item.subscription.status === 'ACTIVE' && item.subscription.plan !== 'FREE')
                ? `<button class="btn-action btn-cancel" onclick="cancelSub('${item.user._id}')"><i class="fa fa-ban"></i> Cancel</button>`
                : '';

              const deleteBtn = item.user.email !== 'admin@netprime.com'
                ? `<button class="btn-action btn-delete" onclick="deleteUser('${item.user._id}')"><i class="fa fa-trash"></i> Delete</button>`
                : '<span style="color: #666; font-size: 0.8rem;">Protected</span>';

              tr.innerHTML = `
                <td>
                  <div style="display: flex; align-items: center; gap: 10px;">
                    <img src="./assets/${item.user.avatar || 'avatar1.png'}" style="width: 32px; height: 32px; border-radius: 50%;">
                    <div>
                      <div style="font-weight: bold; color: #fff;">${item.user.name}</div>
                      <div style="font-size: 0.8rem; color: var(--text-secondary);">${item.user.email}</div>
                    </div>
                  </div>
                </td>
                <td style="color: #ccc; font-size: 0.9rem;">${new Date(item.user.createdAt).toLocaleDateString()}</td>
                <td><span class="badge ${badgeClass}">${subStatus}</span></td>
                <td style="color: #ccc; font-size: 0.9rem;">${expiryText}</td>
                <td>
                  <div style="display: flex; gap: 8px;">
                    ${actionBtn}
                    ${deleteBtn}
                  </div>
                </td>
              `;
              tbody.appendChild(tr);
            });
          }
        } catch (err) {
          console.error(err);
          tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--accent-magenta);">Error loading user list.</td></tr>`;
        }
      }

      // Global window helpers for buttons
      window.cancelSub = async (userId) => {
        if (!confirm('Are you sure you want to force terminate this user\'s premium subscription?')) return;
        try {
          const res = await fetch('/api/admin/cancel-subscription', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId })
          });
          const data = await res.json();
          window.showToastMessage(data.message || data.error);
          loadAdminStats();
          loadUserList(searchInput.value);
        } catch (err) {
          window.showToastMessage('Action failed.');
        }
      };

      window.deleteUser = async (userId) => {
        if (!confirm('Warning: Deleting user removes their profile, subscription, watch logs, and billing invoices. Proceed?')) return;
        try {
          const res = await fetch(`/api/admin/users/${userId}`, {
            method: 'DELETE'
          });
          const data = await res.json();
          window.showToastMessage(data.message || data.error);
          loadAdminStats();
          loadUserList(searchInput.value);
        } catch (err) {
          window.showToastMessage('Action failed.');
        }
      };
    });
  </script>
</body>
</html>
